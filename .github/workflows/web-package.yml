name: Web Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: web-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact_name: cc-switch-web-windows-x64
            archive_name: cc-switch-web-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: cc-switch-web-linux-x64
            archive_name: cc-switch-web-linux-x64.tar.gz
          - name: macos-universal
            os: macos-14
            artifact_name: cc-switch-web-macos-universal
            archive_name: cc-switch-web-macos-universal.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: runner.os != 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: runner.os != 'Linux'
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.1

      - name: Add macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        if: runner.os != 'Linux'
        run: pnpm install --frozen-lockfile

      - name: Build frontend dist
        if: runner.os != 'Linux'
        run: pnpm exec vite build

      - name: Build Windows service
        if: runner.os == 'Windows'
        run: cargo build --locked --release --manifest-path backend/Cargo.toml --bin cc-switch-web

      - name: Build macOS x86_64 service
        if: runner.os == 'macOS'
        run: cargo build --locked --release --target x86_64-apple-darwin --manifest-path backend/Cargo.toml --bin cc-switch-web

      - name: Build macOS aarch64 service
        if: runner.os == 'macOS'
        run: cargo build --locked --release --target aarch64-apple-darwin --manifest-path backend/Cargo.toml --bin cc-switch-web

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $PWD '${{ matrix.artifact_name }}'
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Copy-Item 'backend/target/release/cc-switch-web.exe' (Join-Path $pkgDir 'cc-switch-web.exe')
          Compress-Archive -Path $pkgDir -DestinationPath '${{ matrix.archive_name }}' -Force

      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          out_dir="$RUNNER_TEMP/linux-package"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          docker buildx build \
            --target package-linux-tar \
            --output "type=local,dest=$out_dir" \
            .
          mv "$out_dir/${{ matrix.archive_name }}" "${{ matrix.archive_name }}"

      - name: Package macOS universal archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          pkg_dir="${{ matrix.artifact_name }}"
          rm -rf "$pkg_dir"
          mkdir -p "$pkg_dir"
          lipo -create \
            "backend/target/x86_64-apple-darwin/release/cc-switch-web" \
            "backend/target/aarch64-apple-darwin/release/cc-switch-web" \
            -output "$pkg_dir/cc-switch-web"
          chmod +x "$pkg_dir/cc-switch-web"
          ditto -c -k --keepParent "$pkg_dir" "${{ matrix.archive_name }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  docker-image:
    name: Package (docker-image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image tar
        shell: bash
        run: |
          set -euxo pipefail
          out_dir="$RUNNER_TEMP/docker-image"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          docker buildx build \
            --tag "cc-switch-web:${GITHUB_REF_NAME}" \
            --output "type=docker,dest=$out_dir/cc-switch-web-docker-image.tar" \
            .
          gzip -f "$out_dir/cc-switch-web-docker-image.tar"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-web-docker-image
          path: ${{ runner.temp }}/docker-image/cc-switch-web-docker-image.tar.gz
          if-no-files-found: error
