name: Web Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: web-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact_name: cc-switch-web-windows-x64
            archive_name: cc-switch-web-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: cc-switch-web-linux-x64
            archive_name: cc-switch-web-linux-x64.tar.gz
          - name: macos-universal
            os: macos-14
            artifact_name: cc-switch-web-macos-universal
            archive_name: cc-switch-web-macos-universal.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend dist
        run: pnpm build:web

      - name: Build Windows service
        if: runner.os == 'Windows'
        run: cargo build --locked --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-web

      - name: Build Linux service
        if: runner.os == 'Linux'
        run: cargo build --locked --release --manifest-path src-tauri/Cargo.toml --bin cc-switch-web

      - name: Build macOS x86_64 service
        if: runner.os == 'macOS'
        run: cargo build --locked --release --target x86_64-apple-darwin --manifest-path src-tauri/Cargo.toml --bin cc-switch-web

      - name: Build macOS aarch64 service
        if: runner.os == 'macOS'
        run: cargo build --locked --release --target aarch64-apple-darwin --manifest-path src-tauri/Cargo.toml --bin cc-switch-web

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $PWD '${{ matrix.artifact_name }}'
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Copy-Item 'src-tauri/target/release/cc-switch-web.exe' (Join-Path $pkgDir 'cc-switch-web.exe')
          Copy-Item 'scripts/run-web.cmd' (Join-Path $pkgDir 'run-web.cmd')
          Copy-Item 'scripts/run-web.ps1' (Join-Path $pkgDir 'run-web.ps1')
          Copy-Item 'dist' (Join-Path $pkgDir 'dist') -Recurse
          Compress-Archive -Path $pkgDir -DestinationPath '${{ matrix.archive_name }}' -Force

      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          pkg_dir="${{ matrix.artifact_name }}"
          rm -rf "$pkg_dir"
          mkdir -p "$pkg_dir"
          cp src-tauri/target/release/cc-switch-web "$pkg_dir/cc-switch-web"
          cp scripts/run-web.sh "$pkg_dir/run-web.sh"
          cp -R dist "$pkg_dir/dist"
          chmod +x "$pkg_dir/cc-switch-web" "$pkg_dir/run-web.sh"
          tar -czf "${{ matrix.archive_name }}" "$pkg_dir"

      - name: Package macOS universal archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          pkg_dir="${{ matrix.artifact_name }}"
          rm -rf "$pkg_dir"
          mkdir -p "$pkg_dir"
          lipo -create \
            "src-tauri/target/x86_64-apple-darwin/release/cc-switch-web" \
            "src-tauri/target/aarch64-apple-darwin/release/cc-switch-web" \
            -output "$pkg_dir/cc-switch-web"
          cp scripts/run-web.command "$pkg_dir/run-web.command"
          cp scripts/run-web.sh "$pkg_dir/run-web.sh"
          cp -R dist "$pkg_dir/dist"
          chmod +x "$pkg_dir/cc-switch-web" "$pkg_dir/run-web.command" "$pkg_dir/run-web.sh"
          ditto -c -k --keepParent "$pkg_dir" "${{ matrix.archive_name }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
